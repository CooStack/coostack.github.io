name: 部署前端到 GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 配置 Pages
        uses: actions/configure-pages@v5

      - name: 计算 GitHub Pages 基础路径
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [[ "$REPO_NAME" == *.github.io ]]; then
            echo "VITE_APP_BASE=/" >> "$GITHUB_ENV"
          else
            echo "VITE_APP_BASE=/$REPO_NAME/" >> "$GITHUB_ENV"
          fi

      - name: 构建前端（GitHub Pages 模式）
        run: npm run build:web:github
        env:
          VITE_DEPLOY_TARGET: github-pages
          VITE_ROUTER_MODE: hash
          VITE_PROJECT_REPOSITORY_MODE: local
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: 上传 Pages 构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 发布到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
