<!doctype html>

  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CodeTip 中文演示 - 纯静态 JS/TS 智能提示编辑器</title>
  <link rel="stylesheet" href="./css/code_tip.css" />
</head>
<body class="ct-demo-page">
  <header class="ct-demo-header">
